# QLoRA hyperparameters for Llama 3.1 70B (Config F).
# Source: plan §Phase 4.1b. 4-bit quantization keeps this on consumer GPUs.
model_name: meta-llama/Llama-3.1-70B-Instruct
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
training:
  epochs: 3
  learning_rate: 2.0e-4
  batch_size: 1
  gradient_accumulation_steps: 16
  warmup_ratio: 0.03
  weight_decay: 0.01
  bf16: true
  max_seq_length: 4096
quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_quant_type: nf4
data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  stratify_by: target
