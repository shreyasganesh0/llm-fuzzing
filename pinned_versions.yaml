# pinned_versions.yaml — Single source of truth for all upstream + FuzzBench version pins.
#
# RE2 + fuzzbench + fuzzer-test-suite: filled from web research against
#   https://github.com/google/fuzzer-test-suite/blob/master/re2-2014-12-09/build.sh
# Other targets: still <FILL>. Resolve by:
#   1. Check google/fuzzer-test-suite/<benchmark>/build.sh for get_git_revision calls
#      OR google/oss-fuzz/projects/<project>/Dockerfile for version pins.
#   2. Record the exact commit hash.
#   3. Also fetch the dictionary file path if present.

fuzzbench:
  repo: https://github.com/google/fuzzbench.git
  commit: 3234e151d70f6093272a9b4155e68ee57faf986c  # HEAD as of 2026-04-12

fuzzer_test_suite:
  repo: https://github.com/google/fuzzer-test-suite.git
  commit: 6955fc97efedfda7dcc0979658b169d7eeb5ccd6  # HEAD as of 2026-04-12

targets:
  re2:
    upstream_repo: https://github.com/google/re2.git
    upstream_commit: 499ef7eff7455ce9c9fae86111d4a77b6ac335de  # from fuzzer-test-suite/re2-2014-12-09/build.sh
    fuzzbench_benchmark: re2-2014-12-09
    harness_source: fuzzer-test-suite
    harness_path: re2-2014-12-09/target.cc
    dictionary_path: null
    libfuzzer_extra_flags:
      timeout: 25
      rss_limit_mb: 2048
      max_len: 4096
    seeds: none

  harfbuzz:
    upstream_repo: https://github.com/behdad/harfbuzz.git
    upstream_commit: f73a87d9a8c76a181794b74b527ea268048f78e3  # from fuzzer-test-suite/harfbuzz-1.3.2/build.sh
